<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Stopwatch</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1 class="sr-only">Stopwatch Web Application</h1>

      <section class="stopwatch">
        <div class="display" id="display">00:00.00</div>

        <div class="controls">
          <button id="startBtn" class="btn primary">Start</button>
          <button id="pauseBtn" class="btn" disabled>Pause</button>
          <button id="lapBtn" class="btn" disabled>Lap</button>
          <button id="resetBtn" class="btn" disabled>Reset</button>
        </div>

        <section class="laps" aria-label="Lap times">
          <h2 class="sr-only">Lap times</h2>
          <ol id="lapsList" class="laps-list"></ol>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
